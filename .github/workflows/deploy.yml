name: Build and deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One concurrent deploy; cancel superseded runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Nothing gated a push to main before this: a type error or a broken user
  # journey went straight to production and was only noticed by a coach.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run lint
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: End-to-end tests
        run: npm test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://svrz-rc.openvolley.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build (production)
        run: npm run build
        env:
          # Public API origin (Hetzner backend behind Cloudflare Tunnel).
          # The static site is served from a different origin, so it must call
          # the API absolutely. Same registrable domain as the app on purpose —
          # that is what keeps the session cookie first-party (see
          # infrastructure.md, "Session cookies").
          VITE_API_BASE_URL: https://svrz-rc-api.openvolley.app
      - name: Publish to Cloudflare Pages
        # Wrangler is pinned in package-lock, so the deploy tool cannot change
        # under us between runs. Project + output dir come from wrangler.jsonc.
        run: npx wrangler pages deploy dist --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
